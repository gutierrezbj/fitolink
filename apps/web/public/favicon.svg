<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#16a34a"/>
  <!-- Wheat/plant stem -->
  <line x1="32" y1="52" x2="32" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Left grain -->
  <ellipse cx="23" cy="30" rx="7" ry="4" fill="#bbf7d0" transform="rotate(-35 23 30)"/>
  <!-- Right grain -->
  <ellipse cx="41" cy="30" rx="7" ry="4" fill="#bbf7d0" transform="rotate(35 41 30)"/>
  <!-- Top grain -->
