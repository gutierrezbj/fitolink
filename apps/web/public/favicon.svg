  <!-- Satellite signal arc -->
  <path d="M44 18 Q52 26 44 34" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M47 15 Q58 26 47 37" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
